---
deployment_environment: monitoring

ansible_user: base
ansible_python_interpreter: /usr/bin/python3

monitoring_host_name: automation
monitoring_bind_address: 192.168.56.10

monitoring_desktop_address: 192.168.56.1
monitoring_log_client_addresses:
  - 192.168.56.40
  - 192.168.56.50

grafana_version: "13.1"
grafana_http_port: 3000
grafana_admin_user: admin
grafana_admin_password: "{{ vault_grafana_admin_password }}"

loki_version: "3.7.0"
loki_http_port: 3100
loki_retention_period: 168h

monitoring_root_directory: /opt/infrastructure/monitoring
