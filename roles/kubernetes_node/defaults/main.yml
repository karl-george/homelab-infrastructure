---
kubernetes_version_minor: "1.36"

kubernetes_apt_repository: >-
  https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_minor }}/deb/

kubernetes_apt_key_url: >-
  https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_minor }}/deb/Release.key

kubernetes_apt_keyring_path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

kubernetes_repository_ascii_key_path: /etc/apt/keyrings/kubernetes-release.key

kubernetes_apt_source_path: /etc/apt/sources.list.d/kubernetes.list

kubernetes_packages:
  - kubelet
  - kubeadm
  - kubectl

kubernetes_required_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gpg
  - containerd.io

kubernetes_kernel_modules:
  - overlay
  - br_netfilter

kubernetes_sysctl_settings:
  net.bridge.bridge-nf-call-ip6tables: "1"
  net.bridge.bridge-nf-call-iptables: "1"
  net.ipv4.ip_forward: "1"

kubernetes_api_address: 192.168.56.20
kubernetes_api_port: 6443

kubernetes_pod_network_cidr: 10.244.0.0/16

kubernetes_node_allow_control_plane_scheduling: true

containerd_config_directory: /etc/containerd
containerd_config_path: /etc/containerd/config.toml
containerd_socket_path: /run/containerd/containerd.sock

containerd_service_name: containerd

containerd_default_runtime_name: runc
containerd_runtime_type: io.containerd.runc.v2
containerd_snapshotter: overlayfs

containerd_systemd_cgroup: true

containerd_supported_major_versions:
  - "1"
  - "2"

kubernetes_repository_url: >-
  https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_minor }}/deb/

kubernetes_repository_key_url: >-
  {{ kubernetes_repository_url }}Release.key

kubernetes_repository_key_directory: /etc/apt/keyrings
kubernetes_repository_key_path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
kubernetes_repository_filename: kubernetes

kubernetes_kubelet_defaults_path: /etc/default/kubelet
kubernetes_kubelet_extra_args:
  - "--node-ip={{ kubernetes_api_address }}"
  - "--container-runtime-endpoint=unix://{{ containerd_socket_path }}"

crictl_version: "v{{ kubernetes_version_minor }}.0"
crictl_architecture: amd64

crictl_archive_name: >-
  crictl-{{ crictl_version }}-linux-{{ crictl_architecture }}.tar.gz

crictl_download_url: >-
  https://github.com/kubernetes-sigs/cri-tools/releases/download/{{ crictl_version }}/{{ crictl_archive_name }}

crictl_checksum_url: "{{ crictl_download_url }}.sha256"

crictl_cache_directory: /var/cache/kubernetes
crictl_archive_path: "{{ crictl_cache_directory }}/{{ crictl_archive_name }}"
crictl_binary_path: /usr/local/bin/crictl
crictl_config_path: /etc/crictl.yaml

crictl_runtime_endpoint: "unix://{{ containerd_socket_path }}"
crictl_image_endpoint: "unix://{{ containerd_socket_path }}"
crictl_timeout: 10
crictl_debug: false
