---
kubernetes_version_minor: "1.36"

kubernetes_apt_repository: >-
  https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_minor }}/deb/

kubernetes_apt_key_url: >-
  https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_minor }}/deb/Release.key

kubernetes_apt_keyring_path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

kubernetes_apt_source_path: /etc/apt/sources.list.d/kubernetes.list

kubernetes_packages:
  - kubelet
  - kubeadm
  - kubectl

kubernetes_required_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gpg
  - containerd.io

kubernetes_kernel_modules:
  - overlay
  - br_netfilter

kubernetes_sysctl_settings:
  net.bridge.bridge-nf-call-ip6tables: "1"
  net.bridge.bridge-nf-call-iptables: "1"
  net.ipv4.ip_forward: "1"

kubernetes_api_address: 192.168.56.20
kubernetes_api_port: 6443

kubernetes_pod_network_cidr: 10.244.0.0/16

kubernetes_node_allow_control_plane_scheduling: true

containerd_config_directory: /etc/containerd
containerd_config_path: /etc/containerd/config.toml
containerd_socket_path: /run/containerd/containerd.sock

containerd_service_name: containerd

containerd_default_runtime_name: runc
containerd_runtime_type: io.containerd.runc.v2
containerd_snapshotter: overlayfs

containerd_systemd_cgroup: true

containerd_supported_major_versions:
  - "1"
  - "2"
