---
- name: Reload Kubernetes sysctl settings
  ansible.builtin.command:
    argv:
      - sysctl
      - --system
  changed_when: true

- name: Restart containerd
  ansible.builtin.systemd_service:
    name: "{{ containerd_service_name }}"
    state: restarted
    enabled: true
    daemon_reload: true

- name: Restart kubelet
  ansible.builtin.systemd_service:
    name: kubelet
    state: restarted
    daemon_reload: true
