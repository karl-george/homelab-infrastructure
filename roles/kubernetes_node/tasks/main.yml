---
- name: Validate Kubernetes node variables
  ansible.builtin.assert:
    that:
      - kubernetes_version_minor is string
      - kubernetes_version_minor | length > 0
      - (kubernetes_api_address | ansible.utils.ipaddr) is not false
      - kubernetes_api_port | int > 0
      - kubernetes_api_port | int <= 65535
      - (kubernetes_pod_network_cidr | ansible.utils.ipaddr) is not false
      - kubernetes_required_packages | length > 0
      - kubernetes_kernel_modules | length > 0
      - kubernetes_repository_url | length > 0
      - kubernetes_repository_key_url | length > 0
      - kubernetes_packages | length > 0
      - kubernetes_kubelet_extra_args | length > 0
    fail_msg: >-
      Kubernetes node configuration contains invalid values.
    success_msg: >-
      Kubernetes node configuration contains valid values.

- name: Update APT package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Kubernetes node prerequisites
  ansible.builtin.apt:
    name: "{{ kubernetes_required_packages }}"
    state: present

- name: Read installed containerd version
  ansible.builtin.command:
    argv:
      - containerd
      - --version
  register: containerd_version_command
  changed_when: false

- name: Extract containerd semantic version
  ansible.builtin.set_fact:
    containerd_installed_version: >-
      {{
        containerd_version_command.stdout
        | regex_search('[0-9]+\.[0-9]+\.[0-9]+')
      }}

- name: Extract containerd major version
  ansible.builtin.set_fact:
    containerd_major_version: >-
      {{
        containerd_installed_version.split('.')[0]
      }}

- name: Validate detected containerd version
  ansible.builtin.assert:
    that:
      - containerd_installed_version is defined
      - containerd_installed_version | length > 0
      - containerd_major_version in containerd_supported_major_versions
    fail_msg: >-
      Installed containerd version is not supported.
    success_msg: >-
      Installed containerd version is supported.

- name: Ensure containerd configuration directory exists
  ansible.builtin.file:
    path: "{{ containerd_config_directory }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Kubernetes containerd configuration
  ansible.builtin.template:
    src: containerd-config.toml.j2
    dest: "{{ containerd_config_path }}"
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Restart containerd

- name: Apply containerd configuration before validation
  ansible.builtin.meta: flush_handlers

- name: Ensure containerd is enabled and running
  ansible.builtin.systemd_service:
    name: "{{ containerd_service_name }}"
    state: started
    enabled: true

- name: Wait for containerd socket
  ansible.builtin.wait_for:
    path: "{{ containerd_socket_path }}"
    state: present
    timeout: 30

- name: Ensure APT keyring directory exists
  ansible.builtin.file:
    path: "{{ kubernetes_repository_key_directory }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Kuberenetes repository key
  ansible.builtin.get_url:
    url: "{{ kubernetes_repository_key_url }}"
    dest: /tmp/kubernetes-release.key
    owner: root
    group: root
    mode: "0644"
  register: kubernetes_repository_key_download

- name: Check for Kubernetes repository key
  ansible.builtin.stat:
    path: "{{ kubernetes_repository_key_path }}"
  register: kubernetes_repository_key_stat

- name: Convert Kubernetes signing key to GPG keyring
  ansible.builtin.command:
    argv:
      - gpg
      - --dearmor
      - --yes
      - --output
      - "{{ kubernetes_repository_key_path }}"
      - /tmp/kubernetes-release.key
  when: >-
    kubernetes_repository_key_download.changed
    or
    not kubernetes_repository_key_stat.stat.exists
  changed_when: true

- name: Set Kubernetes repository keyring permissions
  ansible.builtin.file:
    path: "{{ kubernetes_repository_key_path }}"
    state: file
    owner: root
    group: root
    mode: "0644"

- name: Configure Kubernetes repository
  ansible.builtin.deb822_repository:
    name: "{{ kubernetes_repository_filename }}"
    types:
      - deb
    uris:
      - "{{ kubernetes_repository_url }}"
    suites:
      - /
    signed_by: "{{ kubernetes_repository_key_path }}"
    state: present
    enabled: true
  register: kubernetes_repository

- name: Update APT package cache
  ansible.builtin.apt:
    update_cache: true
  when: kubernetes_repository.changed

- name: Install Kubernetes node packages
  ansible.builtin.apt:
    name: "{{ kubernetes_packages }}"
    state: present

- name: Hold Kubernetes packages at their installed versions
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ kubernetes_packages }}"

- name: Configure kubelet node-specific arguments
  ansible.builtin.template:
    src: kubelet-defaults.j2
    dest: "{{ kubernetes_kubelet_defaults_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart kubelet

- name: Ensure kubelet is enabled
  ansible.builtin.systemd_service:
    name: kubelet
    enabled: true
    daemon_reload: true

- name: Remove temp Kubernetes repo signing key
  ansible.builtin.file:
    path: /tmp/kubernetes-release.key
    state: absent

- name: Check active swap
  ansible.builtin.command:
    argv:
      - swapon
      - --show
      - --noheadings
  register: kubernetes_active_swap
  changed_when: false

- name: Disable active swap
  ansible.builtin.command:
    argv:
      - swapoff
      - --all
  when: kubernetes_active_swap.stdout | trim | length > 0
  changed_when: true

- name: Disable swap entries in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(\s*[^#\n]+\s+\S+\s+swap\s+\S+.*)$'
    replace: '# \1'
    backup: true

- name: Configure Kubernetes kernel modules
  ansible.builtin.template:
    src: kubernetes-modules.conf.j2
    dest: /etc/modules-load.d/kubernetes.conf
    owner: root
    group: root
    mode: "0644"

- name: Load Kubernetes kernel modules
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ kubernetes_kernel_modules }}"

- name: Configure Kubernetes sysctl settings
  ansible.builtin.template:
    src: kubernetes-sysctl.conf.j2
    dest: /etc/sysctl.d/99-kubernetes.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload Kubernetes sysctl settings

- name: Allow Kubernetes API from Host-Only network
  community.general.ufw:
    rule: allow
    direction: in
    proto: tcp
    src: 192.168.56.0/24
    to_port: "{{ kubernetes_api_port }}"
    comment: Kubernetes API from Host-Only network
