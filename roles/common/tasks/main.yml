---
- name: Update apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Set UFW default incoming policy
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set UFW default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH before enabling UFW
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Enable UFW
  community.general.ufw:
    state: enabled
