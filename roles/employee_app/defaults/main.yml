---
employee_app_name: employee-directory

deployment_environment: production

employee_app_repo: "https://github.com/karl-george/employee-directory.git"
employee_app_version: main

employee_app_user: base
employee_app_group: base

employee_app_secret_key: ""
employee_app_config_directory: /etc/employee-directory
employee_app_environment_file: "{{ employee_app_config_directory }}/employee-directory.env"

employee_app_root: /opt/apps
employee_app_directory: "{{ employee_app_root }}/{{ employee_app_name }}"
employee_app_source_directory: "{{ employee_app_directory }}/app"
employee_app_venv_directory: "{{ employee_app_source_directory }}/venv"

employee_app_requirements_file: "{{ employee_app_source_directory }}/requirements.txt"

employee_app_database_file: "{{ employee_app_source_directory }}/employees.db"

employee_app_service_name: employee-directory

employee_app_bind_address: 127.0.0.1
employee_app_bind_port: 8000
employee_app_workers: 3

employee_app_healthcheck_path: /health
employee_app_healthcheck_url: http://{{ employee_app_bind_address }}:{{ employee_app_bind_port }}{{ employee_app_healthcheck_path }}
