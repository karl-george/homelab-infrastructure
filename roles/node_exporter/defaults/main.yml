---
node_exporter_version: "1.12.0"

node_exporter_user: node_exporter
node_exporter_group: node_exporter

node_exporter_install_directory: /usr/local/bin
node_exporter_binary_path: >-
  {{ node_exporter_install_directory }}/node_exporter

node_exporter_download_directory: /tmp

node_exporter_archive_name: >-
  node_exporter-{{ node_exporter_version }}.linux-{{
  node_exporter_release_architecture }}.tar.gz

node_exporter_download_url: >-
  https://github.com/prometheus/node_exporter/releases/download/v{{
  node_exporter_version }}/{{ node_exporter_archive_name }}

node_exporter_checksum_url: >-
  https://github.com/prometheus/node_exporter/releases/download/v{{
  node_exporter_version }}/sha256sums.txt

node_exporter_extract_directory: >-
  {{ node_exporter_download_directory }}/node_exporter-{{
  node_exporter_version }}.linux-{{
  node_exporter_release_architecture }}

node_exporter_service_name: node_exporter
node_exporter_service_unit_path: >-
  /etc/systemd/system/{{ node_exporter_service_name }}.service

node_exporter_listen_address: 127.0.0.1
node_exporter_port: 9100

node_exporter_prometheus_address: 127.0.0.1

node_exporter_enabled_collectors:
  - systemd
