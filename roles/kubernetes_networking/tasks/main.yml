---
- name: Download Flannel manifest
  ansible.builtin.get_url:
    url: "{{ flannel_manifest_url }}"
    dest: "{{ flannel_manifest_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Apply Flannel manifest
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - apply
      - -f
      - "{{ flannel_manifest_path }}"
  register: flannel_apply
  changed_when: >-
    'created' in flannel_apply.stdout
    or
    'configured' in flannel_apply.stdout

- name: Verify Flannel namespace
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - get
      - namespace
      - "{{ flannel_namespace }}"
  changed_when: false

- name: Wait for Flannel DaemonSet rollout
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - rollout
      - status
      - daemonset/kube-flannel-ds
      - -n
      - "{{ flannel_namespace }}"
      - --timeout=180s
  register: flannel_rollout
  changed_when: false

- name: Wait for Kubernetes node to become ready
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - wait
      - --for=condition=Ready
      - node
      - "{{ inventory_hostname }}"
      - --timeout=180s
  register: node_ready
  changed_when: false

- name: Wait for CoreDNS rollout
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - rollout
      - status
      - deployment/coredns
      - -n
      - kube-system
      - --timeout=180s
  register: coredns_rollout
  changed_when: false

- name: Retrieve Kubernetes nodes
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/kubernetes/admin.conf
      - get
      - nodes
      - -o
      - wide
  register: kubernetes_nodes
  changed_when: false

- name: Display Kubernetes nodes
  ansible.builtin.debug:
    var: kubernetes_nodes.stdout_lines
