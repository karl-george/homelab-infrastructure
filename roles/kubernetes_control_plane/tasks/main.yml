---
- name: Validate control-plane configuration
  ansible.builtin.assert:
    that:
      - kubernetes_cluster_name | length > 0
      - kubernetes_control_plane_address | length > 0
      - kubernetes_control_plane_port | int > 0
      - kubernetes_control_plane_port | int <= 65535
      - kubernetes_pod_network_cidr | length > 0
      - kubernetes_service_network_cidr | length > 0
      - kubernetes_cri_socket | length > 0
      - kubernetes_admin_user | length > 0
    fail_msg: >-
      Kubernetes control-plane configuration contains invalid values.

- name: Allow Kubernetes kubelet API access
  community.general.ufw:
    rule: allow
    proto: tcp
    src: "{{ kubernetes_api_allowed_network }}"
    port: "{{ kubernetes_kubelet_port | string }}"
    comment: Kubernetes kubelet API

- name: Deploy kubeadm initialisation configuration
  ansible.builtin.template:
    src: kubeadm-init.yaml.j2
    dest: "{{ kubernetes_kubeadm_config_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Check whether the control plane has already been initialised
  ansible.builtin.stat:
    path: "{{ kubernetes_admin_config_path }}"
  register: kubernetes_admin_config

- name: Validate kubeadm configuration
  ansible.builtin.command:
    argv:
      - kubeadm
      - config
      - validate
      - --config
      - "{{ kubernetes_kubeadm_config_path }}"
  changed_when: false
  when: not kubernetes_admin_config.stat.exists

- name: Pull Kubernetes control-plane images
  ansible.builtin.command:
    argv:
      - kubeadm
      - config
      - images
      - pull
      - --config
      - "{{ kubernetes_kubeadm_config_path }}"
  when: not kubernetes_admin_config.stat.exists
  changed_when: true

- name: Initialise Kubernetes control-plane
  ansible.builtin.command:
    argv:
      - kubeadm
      - init
      - --config
      - "{{ kubernetes_kubeadm_config_path }}"
  register: kubernetes_kubeadm_init
  when: not kubernetes_admin_config.stat.exists
  changed_when: true

- name: Recheck Kubernetes admin configuration
  ansible.builtin.stat:
    path: "{{ kubernetes_admin_config_path }}"
  register: kubernetes_admin_config_after_init

- name: Confirm control-plane initialisation completed
  ansible.builtin.assert:
    that:
      - kubernetes_admin_config_after_init.stat.exists
    fail_msg: >-
      kubeadm did not create {{ kubernetes_admin_config_path }}.

- name: Wait for Kubernetes API server
  ansible.builtin.wait_for:
    host: "{{ kubernetes_control_plane_address }}"
    port: "{{ kubernetes_control_plane_port }}"
    state: started
    timeout: 180

- name: Ensure Kubernetes admin kubeconfig directory exists
  ansible.builtin.file:
    path: "{{ kubernetes_admin_home }}/.kube"
    state: directory
    owner: "{{ kubernetes_admin_user }}"
    group: "{{ kubernetes_admin_group }}"
    mode: "0700"

- name: Install admin kubeconfig
  ansible.builtin.copy:
    src: "{{ kubernetes_admin_config_path }}"
    dest: "{{ kubernetes_user_kubeconfig_path }}"
    remote_src: true
    owner: "{{ kubernetes_admin_user }}"
    group: "{{ kubernetes_admin_group }}"
    mode: "0600"

- name: Retrieve Kubernetes nodes
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ kubernetes_user_kubeconfig_path }}"
      - get
      - nodes
      - -o
      - wide
  register: kubernetes_nodes
  changed_when: false
