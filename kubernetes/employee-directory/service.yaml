---
apiVersion: v1
kind: Service

metadata:
  name: employee-directory
  namespace: employee-directory

  labels:
    app.kubernetes.io/name: employee-directory
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: homelab-platform

spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: employee-directory
    app.kubernetes.io/component: web

  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
