---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: employee-directory
  namespace: employee-directory

  labels:
    app.kubernetes.io/name: employee-directory
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: homelab-platform

spec:
  replicas: 1

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: employee-directory
      app.kubernetes.io/component: web

  template:
    metadata:
      labels:
        app.kubernetes.io/name: employee-directory
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: homelab-platform

    spec:
      containers:
        - name: employee-directory
          image: ghcr.io/karl-george/employee-directory:v1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
